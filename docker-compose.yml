services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cti-backend
    environment:
      - PORT=4000
      - NODE_ENV=production
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cti-backend.rule=Host(`passagemdeplantao.eletrostarsoft.com.br`) && PathPrefix(`/api`)"
      - "traefik.http.routers.cti-backend.entrypoints=websecure"
      - "traefik.http.routers.cti-backend.tls=true"
      - "traefik.http.routers.cti-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.cti-backend.loadbalancer.server.port=4000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cti-frontend
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cti-frontend.rule=Host(`passagemdeplantao.eletrostarsoft.com.br`)"
      - "traefik.http.routers.cti-frontend.entrypoints=websecure"
      - "traefik.http.routers.cti-frontend.tls=true"
      - "traefik.http.routers.cti-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.cti-frontend.loadbalancer.server.port=3000"
