services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: cti-app-backend:latest
    container_name: cti-backend
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: "${DATABASE_URL:?Configure DATABASE_URL no arquivo .env}"
      DIRECT_URL: "${DIRECT_URL:?Configure DIRECT_URL no arquivo .env. Pode ser igual ao DATABASE_URL se voce nao usa URL direta separada.}"
      CORS_ORIGIN: "${CORS_ORIGIN:-https://passagemdeplantao.eletrostarsoft.com.br,http://localhost:3000}"
    ports:
      - "${BIND_IP:-127.0.0.1}:${BACKEND_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cti-network
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.cti-backend.rule=Host(`${APP_DOMAIN:-passagemdeplantao.eletrostarsoft.com.br}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.cti-backend.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.cti-backend.tls=true"
      - "traefik.http.routers.cti-backend.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.cti-backend.priority=100"
      - "traefik.http.services.cti-backend.loadbalancer.server.port=4000"
      - "traefik.docker.network=${DOCKER_NETWORK:-cti-app-network}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://passagemdeplantao.eletrostarsoft.com.br/api}"
    image: cti-app-frontend:latest
    container_name: cti-frontend
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://passagemdeplantao.eletrostarsoft.com.br/api}"
    ports:
      - "${BIND_IP:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - cti-network
    labels:
      - "traefik.enable=${TRAEFIK_ENABLE:-false}"
      - "traefik.http.routers.cti-frontend.rule=Host(`${APP_DOMAIN:-passagemdeplantao.eletrostarsoft.com.br}`)"
      - "traefik.http.routers.cti-frontend.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.cti-frontend.tls=true"
      - "traefik.http.routers.cti-frontend.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.cti-frontend.priority=10"
      - "traefik.http.services.cti-frontend.loadbalancer.server.port=3000"
      - "traefik.docker.network=${DOCKER_NETWORK:-cti-app-network}"

networks:
  cti-network:
    name: "${DOCKER_NETWORK:-cti-app-network}"
    external: ${DOCKER_NETWORK_EXTERNAL:-false}
